# 激活方式：SPRING_PROFILES_ACTIVE=k8s
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:host.minikube.internal}:${DB_PORT:5432}/iot_learn?options=-c%20TimeZone=Asia/Shanghai
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: ${NACOS_ADDR:192.168.19.64:8848}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:host.minikube.internal:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0   # 学习环境全采样；生产常 0.01~0.1
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://host.minikube.internal:4318/v1/traces}
