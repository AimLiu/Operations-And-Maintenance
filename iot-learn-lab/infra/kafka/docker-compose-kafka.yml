# 要点：advertised.listeners 必须包含 Windows 可达地址 192.168.19.64:9092
services:
  kafka:
    # 使用 Apache 官方 Kafka 镜像；这里固定到 3.9.2，避免 latest 带来的不确定性
    image: apache/kafka:3.9.2
    # 设置容器主机名；这里让它与服务名一致，便于容器网络内通过 kafka 访问
    hostname: kafka
    # 固定容器名，方便 docker ps / docker logs / docker exec 使用
    container_name: kafka-learn
    # 异常退出时自动重启
    restart: unless-stopped
    ports:
      # 宿主机访问 Kafka 使用 localhost:9092
      - "9092:9092"
    environment:
      # --- 新增这行来限制 JVM 内存占用 ---
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
      # 当前节点 ID；单节点通常设置为 1
      KAFKA_NODE_ID: 1
      # 当前节点同时承担 broker 和 controller 角色（KRaft 单机模式）
      KAFKA_PROCESS_ROLES: "broker,controller"
      # 指定 controller 使用的监听器名称
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # 监听器与协议的映射关系
      # CONTROLLER：KRaft 控制器通信
      # PLAINTEXT：容器网络内部访问
      # PLAINTEXT_HOST：宿主机访问
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      # Kafka 实际监听的地址
      # 29093 -> controller 通信端口
      # 19092 -> Docker 网络内部客户端 / broker 间通信端口
      # 9092  -> 宿主机访问端口
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092"
      # Kafka 对外通告的地址
      # 宿主机程序连接：localhost:9092
      # 同一 Docker 网络中的其他容器连接：kafka:19092
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092"
      # broker 之间通信使用的监听器名称
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # KRaft controller 投票节点列表；单节点只写自己
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      # KRaft 集群 ID；显式写出更清晰，也避免重建时混淆
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      # 单节点环境下，Kafka 内部主题副本数必须为 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # 单节点环境下，事务状态主题的最小 ISR 也要为 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 缩短消费者组初始 rebalance 延迟，便于本地学习测试
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 默认分区数；本地学习环境通常设置为 1
      KAFKA_NUM_PARTITIONS: 3
      # 允许自动创建 topic；开发学习方便，生产一般建议关闭
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Kafka 数据目录；映射到宿主机 ./data
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    healthcheck:
      # 使用 Kafka 自带 CLI 检查 broker 是否已能响应请求
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      # 使用 docker-compose.yml 同级目录下的 data 目录持久化 Kafka 数据
      - ./data:/var/lib/kafka/data
    networks:
      - kafka-network
networks:
  kafka-network:
    driver: bridge