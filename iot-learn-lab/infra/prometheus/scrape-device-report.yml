# 追加到 prometheus-learn 的 prometheus.yml 的 scrape_configs 末尾
- job_name: device-report-service
  metrics_path: /actuator/prometheus
  static_configs:
    - targets:
        - 192.168.16.1:8765
        - 192.168.16.1:8766
      labels:
        env: learn
        service: device-report-service
- job_name: command-dispatch-service
  metrics_path: /actuator/prometheus
  static_configs:
    - targets: ['192.168.16.1:8767']
      labels:
        env: learn
        service: command-dispatch-service
- job_name: apisix
  metrics_path: /apisix/prometheus/metrics
  static_configs:
    - targets:
        - 192.168.19.64:9091    # WSL 宿主机 IP，或用 host.docker.internal:9091
      labels:
        env: learn
        service: apisix
# ----- Stage 2 W3：minikube NodePort（把 MINIKUBE_IP 换成 minikube ip 输出）-----
- job_name: device-report-service-k8s
  metrics_path: /actuator/prometheus
  static_configs:
    - targets:
        - 192.168.49.2:30765
      labels:
        env: learn-k8s
        service: device-report-service
        runtime: minikube
- job_name: command-dispatch-service-k8s
  metrics_path: /actuator/prometheus
  static_configs:
    - targets:
        - 192.168.49.2:30767
      labels:
        env: learn-k8s
        service: command-dispatch-service
        runtime: minikube