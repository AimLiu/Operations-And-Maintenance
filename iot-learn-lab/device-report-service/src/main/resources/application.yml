server:
  port: 8765

spring:
  application:
    name: device-report-service
  datasource:
    # TimeZone 仅影响 PostgreSQL 会话的显示/解析方式；TIMESTAMPTZ 内部仍存 UTC 时刻
    url: jdbc:postgresql://192.168.19.64:5432/iot_learn?options=-c%20TimeZone=Asia/Shanghai
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          # 作用于 LocalDateTime/Timestamp 等无时区类型；Instant 映射 TIMESTAMPTZ 始终按 UTC 时刻存储
          time_zone: Asia/Shanghai
  data:
    redis:
      host: ${REDIS_HOST:192.168.19.64}
      port: ${REDIS_PORT:6379}
      database: 1

  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  cloud:
    sentinel:
      transport:
        dashboard: 192.168.19.64:8858
        port: 8719
      eager: true
      datasource: # ✅ 与 transport 同级
        flow:
          nacos:
            server-addr: ${NACOS_ADDR:192.168.19.64:8848}
            dataId: device-report-service-flow-rules
            groupId: SENTINEL_GROUP
            rule-type: flow
        degrade:
          nacos:
            server-addr: ${NACOS_ADDR:192.168.19.64:8848}
            dataId: device-report-service-degrade-rules
            groupId: SENTINEL_GROUP
            rule-type: degrade
    openfeign:
      client:
        config:
          command-dispatch-service: # 与 @FeignClient(name = "...") 一致
            connectTimeout: 3000
            readTimeout: 10000
          default:
            connectTimeout: 5000
            readTimeout: 10000
feign:
  sentinel:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: device-report-service
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s

# 日志目录由 ModuleLogPathEnvironmentPostProcessor 自动解析为 iot-learn-lab/device-report-service/log
# 仅当设置环境变量 LOGGING_FILE_PATH 时才覆盖
logging:
  level:
    com.iot.learn: INFO

#添加feign-url
dispatch:
  base-url: ${DISPATCH_BASE_URL:http://localhost:8767}