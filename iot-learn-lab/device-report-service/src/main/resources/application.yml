server:
  port: 8765

spring:
  application:
    name: device-report-service
  datasource:
    # TimeZone 仅影响 PostgreSQL 会话的显示/解析方式；TIMESTAMPTZ 内部仍存 UTC 时刻
    url: jdbc:postgresql://192.168.19.64:5432/iot_learn?options=-c%20TimeZone=Asia/Shanghai
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          # 作用于 LocalDateTime/Timestamp 等无时区类型；Instant 映射 TIMESTAMPTZ 始终按 UTC 时刻存储
          time_zone: Asia/Shanghai
  data:
    redis:
      host: ${REDIS_HOST:192.168.19.64}
      port: ${REDIS_PORT:6379}
      database: 1

  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:192.168.19.64:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
        metadata:
          version: v1
      config:
        file-extension: yaml
    sentinel:
      transport:
        dashboard: 192.168.19.64:8858
        port: 8719
      eager: true
#      datasource: # ✅ 与 transport 同级
#        flow:
#          nacos:
#            server-addr: ${NACOS_ADDR:192.168.19.64:8848}
#            dataId: device-report-service-flow-rules
#            groupId: SENTINEL_GROUP
#            rule-type: flow
#        degrade:
#          nacos:
#            server-addr: ${NACOS_ADDR:192.168.19.64:8848}
#            dataId: device-report-service-degrade-rules
#            groupId: SENTINEL_GROUP
#            rule-type: degrade
    openfeign:
      client:
        config:
          command-dispatch-service: # 与 @FeignClient(name = "...") 一致
            connectTimeout: 3000
            readTimeout: 10000
          default:
            connectTimeout: 5000
            readTimeout: 10000
  # Phase 4 金丝雀：Nacos 配置导入只保留在 application-v2.yml
  # 默认 / k8s 不再 optional:nacos import，避免混合部署时 gRPC 连 127.0.0.1 刷屏
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:192.168.19.64:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 5          # 微批次，利于吞吐
        batch.size: 16384


feign:
  sentinel:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: device-report-service
      version: ${app.version:v1}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s

# 日志目录由 ModuleLogPathEnvironmentPostProcessor 自动解析为 iot-learn-lab/device-report-service/log
# 仅当设置环境变量 LOGGING_FILE_PATH 时才覆盖
logging:
  level:
    com.iot.learn: INFO

#添加feign-url
dispatch:
  base-url: ${DISPATCH_BASE_URL:http://localhost:8767}

app:
  version: v1
  kafka:
    topic: ${KAFKA_TOPIC:device-report-events}
  cache:
    stats-ttl-seconds: 10
    stats-ttl-jitter-seconds: 5      # E6 雪崩：TTL 随机抖动
    null-cache-enabled: true            # E4 穿透：空值缓存
    null-cache-ttl-seconds: 30
    breakdown-lock-enabled: false        # E5 击穿：Redis 互斥锁（可设 false 对比）
    lock-wait-millis: 3000